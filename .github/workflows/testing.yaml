name: unit_tesing
on: 
  push:
    branches:
      - main
jobs:
  test:
    runs-on : ubuntu-latest
    steps:
      - name : checkout
        uses : actions/checkout@v2
      - name : install dependency
        run  : |
          pip install --upgrade python 
          pip install --upgrade pytest
      - name : run test
        run : pytest


